<form id="frm_inquiry" name="frm_inquiry" method="post" class="form">
    <div class="form-row">
        <div class="form-group">
            <input type="text" name="name" class="form-control" placeholder="Full Name" required="" autocomplete="name">
        </div>
        <div class="form-group">
            <input type="email" name="email" class="form-control" placeholder="Email Address" required=""
                autocomplete="email">
        </div>
        <div class="form-group">
            <input type="tel" name="phone" class="form-control" placeholder="Phone Number" autocomplete="tel">
        </div>
        <input type="hidden" name="subject" value="Service Inquiry Request">
        <div class="form-group message-group">
            <textarea class="form-control" name="message" rows="4" placeholder="Describe your project needs..."
                required=""></textarea>
        </div>
    </div>
    <div class="form-actions">
        <div class="loading hide_ele">Loading</div>
        <div class="error-message hide_ele"></div>
        <div class="sent-message hide_ele">Your message has been sent. Thank you!</div>
        <button type="submit" class="btn-request">Submit Inquiry <i class="bi bi-arrow-right"></i></button>
    </div>
</form>
<script src="../../assets/js/handle_service_qoute.js"></script>
